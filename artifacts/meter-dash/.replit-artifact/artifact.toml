kind = "web"
previewPath = "/"
title = "MeterDash"
version = "1.0.0"
id = "artifacts/meter-dash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18411

[services.development]
run = "pnpm --filter @workspace/meter-dash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meter-dash", "run", "build" ]
publicDir = "artifacts/meter-dash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18411"
BASE_PATH = "/"
