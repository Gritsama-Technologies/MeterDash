###############################################################################
# Netlify configuration — frontend only (artifacts/meter-dash)
#
# The backend (artifacts/api-server) is a stateful Express service with an
# in-memory frame store. It is NOT deployed to Netlify. Host it on a
# long-running Node platform (Render / Railway / Fly.io) and point the
# frontend at it via the VITE_API_BASE_URL build variable.
###############################################################################

[build]
  base    = "."
  publish = "artifacts/meter-dash/dist/public"
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && BASE_PATH=/ PORT=4173 pnpm --filter @workspace/meter-dash run build"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "9"
  NPM_FLAGS     = "--version"   # tell Netlify to skip its npm install step

# SPA fallback so client-side routes (wouter) resolve correctly
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
