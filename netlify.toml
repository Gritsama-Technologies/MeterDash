###############################################################################
# Netlify configuration — single-deploy: dashboard + API on the same site.
#
# - Static React/Vite SPA from `artifacts/meter-dash`
# - API served by a Netlify Function at `/api/*` (in-memory store)
###############################################################################

[build]
  base      = "."
  publish   = "artifacts/meter-dash/dist/public"
  functions = "netlify/functions"
  command   = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && BASE_PATH=/ PORT=4173 pnpm --filter @workspace/meter-dash run build"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  NPM_FLAGS    = "--version"

[functions]
  node_bundler = "esbuild"

# Belt-and-suspenders: even though the function declares `config.path`,
# we add an explicit rewrite so /api/* always lands on the function
# before the SPA fallback runs.
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback for client-side routes (wouter)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
