openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MeterDash API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: meter
    description: Electrical meter telemetry operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /data:
    get:
      operationId: getLatestMeterData
      tags: [meter]
      summary: Get latest meter data
      description: Returns the most recently received and parsed meter telemetry payload, or null if no data has been received yet.
      responses:
        "200":
          description: Latest meter data (or null if none received)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeterDataResponse"
    post:
      operationId: ingestMeterData
      tags: [meter]
      summary: Ingest a raw telemetry frame
      description: |
        Accepts a raw telemetry string (e.g. `frame$EM6400,V1n:239.8,...,Z`) either as
        `text/plain` or as a JSON object `{ "raw": "..." }`. Parses it and stores the
        result as the latest meter payload.
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "frame$EM6400,V1n:239.8,V2n:240.4,V3n:238.9,Z"
          application/json:
            schema:
              type: object
              properties:
                raw:
                  type: string
              required:
                - raw
      responses:
        "200":
          description: Parsed meter payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeterPayload"
        "400":
          description: Malformed telemetry string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /history:
    get:
      operationId: getMeterHistory
      tags: [meter]
      summary: Get recent meter history
      description: Returns the most recent meter payloads received (newest first), capped to the last 60 frames. Useful for sparkline trends in the dashboard.
      responses:
        "200":
          description: Recent meter payloads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MeterPayload"
  /summary:
    get:
      operationId: getMeterSummary
      tags: [meter]
      summary: Get aggregated dashboard summary
      description: |
        Returns a polished dashboard summary including frame count, last-received
        timestamp, average load (kW) over the recent window, peak/min readings,
        and counts of stale/healthy frames. Useful as a top-of-dashboard hero band.
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeterSummary"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MeterValue:
      description: A parsed telemetry value. Numeric where possible, otherwise raw string.
      oneOf:
        - type: number
        - type: string
    MeterPayload:
      type: object
      properties:
        meterId:
          type: string
          description: The meter identifier from the frame (e.g. "EM6400").
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp of when the frame was received by the server.
        data:
          type: object
          description: All key/value pairs parsed from the frame.
          additionalProperties:
            $ref: "#/components/schemas/MeterValue"
      required:
        - meterId
        - timestamp
        - data
    MeterDataResponse:
      type: ["object", "null"]
      description: Latest payload, or null if no telemetry has been received yet.
      properties:
        meterId:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MeterValue"
      required:
        - meterId
        - timestamp
        - data
    MeterSummary:
      type: object
      properties:
        meterId:
          type: ["string", "null"]
        framesReceived:
          type: integer
          description: Total frames received since server start.
        windowSize:
          type: integer
          description: Number of frames used to compute window aggregates.
        lastTimestamp:
          type: ["string", "null"]
          format: date-time
        staleCount:
          type: integer
          description: Number of frames in the window with STALE != 0.
        healthyCount:
          type: integer
          description: Number of frames in the window with STALE == 0.
        avgKw:
          type: ["number", "null"]
        peakKw:
          type: ["number", "null"]
        minKw:
          type: ["number", "null"]
        avgPf:
          type: ["number", "null"]
        avgFreq:
          type: ["number", "null"]
        avgRssi:
          type: ["number", "null"]
        kwhFwd:
          type: ["number", "null"]
        kwhRev:
          type: ["number", "null"]
      required:
        - framesReceived
        - windowSize
        - staleCount
        - healthyCount
